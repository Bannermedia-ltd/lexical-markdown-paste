name: Feature Request
description: Suggest a new feature
labels: [enhancement]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: >
        A short description of the feature.
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: >
        Why do you need this? What problem does
        it solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: >
        How might this work? (Optional)
    validations:
      required: false
